<!DOCTYPE html>
<html>
<head>
  <title>Spot — see where your friends are</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; }
    #header {
      background: #1a1a2e;
      color: white;
      padding: 16px 20px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    #map {
      height: calc(100vh - 56px);
      width: 100%;
    }
    .popup-name {
      font-weight: 600;
      font-size: 14px;
    }
    .popup-message {
      color: #555;
      font-size: 13px;
      margin-top: 2px;
    }
    .popup-place {
      color: #1a1a2e;
      font-size: 13px;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<div id="header">SPOT</div>
<div id="map"></div>

<script>
  const map = L.map('map').setView([59.3293, 18.0686], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  // fetch active checkins from the API
  fetch('/api/feed/')
    .then(res => res.json())
    .then(checkins => {
      if (checkins.length === 0) {
        console.log('No active checkins from friends right now');
      }

      checkins.forEach(checkin => {
        const lat = checkin.place.latitude;
        const lng = checkin.place.longitude;
        const username = checkin.user.username;
        const place = checkin.place.name;
        const message = checkin.message || 'is here';

        const marker = L.marker([lat, lng]).addTo(map);
        marker.bindPopup(`
          <div class="popup-name">${username}</div>
          <div class="popup-message">${message}</div>
          <div class="popup-place">${place}</div>
        `);
      });
    })
    .catch(err => console.error('Could not load checkins:', err));
</script>

</body>
</html>
